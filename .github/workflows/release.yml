name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p /tmp/build/cftgroup-forms
          rsync -r --exclude='.git' --exclude='.github' . /tmp/build/cftgroup-forms/
          cd /tmp/build
          zip -r cftgroup-forms.zip cftgroup-forms/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/cftgroup-forms.zip
          generate_release_notes: true
