<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="#0f1117"/>

  <!-- Gold accent bar left edge -->
  <rect x="0" y="0" width="8" height="256" rx="4" fill="#eeae00"/>

  <!-- C letter -->
  <path d="M72 88
             C72 88 52 88 52 128
             C52 168 72 168 72 168
             L92 168
             C92 168 76 160 76 128
             C76 96 92 88 92 88
             Z"
        fill="#eeae00"/>

  <!-- F letter -->
  <rect x="104" y="88" width="16" height="80" rx="4" fill="#ffffff"/>
  <rect x="104" y="88" width="48" height="16" rx="4" fill="#ffffff"/>
  <rect x="104" y="120" width="38" height="14" rx="4" fill="#ffffff"/>

  <!-- T letter -->
  <rect x="164" y="88" width="52" height="16" rx="4" fill="#ffffff"/>
  <rect x="182" y="88" width="16" height="80" rx="4" fill="#ffffff"/>

  <!-- Thin gold underline accent -->
  <rect x="52" y="182" width="152" height="5" rx="2.5" fill="#eeae00" opacity="0.6"/>

  <!-- GROUP text -->
  <text x="128" y="220"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#eeae00"
        text-anchor="middle"
        letter-spacing="6">GROUP</text>
</svg>
